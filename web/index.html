<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="food_aid">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>food_aid</title>
  <link rel="manifest" href="manifest.json">
</head>
  <style>
    body {
      background-color: #050505;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #00e5ff;
    }
    .loader-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .scanner {
      width: 150px;
      height: 150px;
      border: 2px solid rgba(0, 229, 255, 0.2);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
    }
    .scanner::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(transparent, transparent, transparent, #00e5ff);
      animation: rotate 2s linear infinite;
    }
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }
    .status-text {
      margin-top: 30px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: blink 1.5s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .terminal-decor {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid #00e5ff;
    }
    .tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
    .tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
    .bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
    .br { bottom: -10px; right: -10px; border-left: none; border-top: none; }
    
    #loading-screen {
      transition: opacity 0.5s ease-out;
    }
  </style>
  <div id="loading-screen">
    <div class="loader-container">
      <div class="terminal-decor tl"></div>
      <div class="terminal-decor tr"></div>
      <div class="terminal-decor bl"></div>
      <div class="terminal-decor br"></div>
      <div class="scanner"></div>
      <div class="status-text">System Initializing...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // The loading screen will be handled by Flutter once it initializes
    });
  </script>
</html>
